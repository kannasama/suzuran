services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: suzuran
      POSTGRES_PASSWORD: suzuran
      POSTGRES_DB: suzuran
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suzuran"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: kannasama/suzuran:latest
    # build: .  # uncomment to build from source instead
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://suzuran:suzuran@db:5432/suzuran
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # WebAuthn passkey configuration.
      # RP_ID must be the hostname you use to access the app (no port, no protocol).
      # RP_ORIGIN must be the full origin: protocol + hostname + port if non-standard.
      # Example for local access: RP_ID=localhost  RP_ORIGIN=http://localhost:3000
      # Example for LAN access:   RP_ID=192.168.1.10  RP_ORIGIN=http://192.168.1.10:3000
      RP_ID: ${RP_ID:-localhost}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost:3000}
      # Set UPLOADS_DIR if you want uploaded images stored outside the default /app/uploads
      # UPLOADS_DIR: /app/uploads
    volumes:
      # Background image uploads — persists between container restarts
      - ./uploads:/app/uploads
      # Music library mounts — add one volume per library path you configure in the UI.
      # The container path is what you enter when creating a library in suzuran.
      # Example: mount your main music collection read-write so suzuran can organise it
      - ${MUSIC_DIR:-/path/to/your/music}:/music
      # Example: mount a second collection (read-only if suzuran should not move files)
      # - /path/to/more/music:/music2:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
